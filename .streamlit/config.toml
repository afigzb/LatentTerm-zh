# 此配置文件对开发和打包分发都生效。
# 打包脚本会将项目根目录原样复制到分发包，Streamlit 启动时会自动读取本文件。

[server]
# 固定端口，避免每次随机端口导致浏览器书签失效
# port = 8965  # 本地/打包用，部署 Streamlit Cloud 时不要启用
# 关闭文件监听，避免在中文路径 / 只读介质上抽风
fileWatcherType = "none"
# 不要在运行时检查依赖版本（离线环境下无意义且会报错）
enableCORS = false
enableXsrfProtection = false

[browser]
# 不上报使用数据
gatherUsageStats = false

[client]
# 只显示最少的工具栏（隐藏 Deploy 按钮、Streamlit logo 等）
toolbarMode = "minimal"
showErrorDetails = true

[theme]
base = "light"
primaryColor = "#7C3AED"
